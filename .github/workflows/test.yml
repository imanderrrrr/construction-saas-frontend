name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    name: Frontend (Vite / Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build production bundle
        run: npm run build

      # TODO (follow-up): add a minimal ESLint config + `npm run lint` step as a
      # required check. Typecheck (tsc --noEmit) is now wired above alongside
      # test + build.
