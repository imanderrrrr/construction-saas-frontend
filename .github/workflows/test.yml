name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    name: Frontend (Vite / Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build production bundle
        run: npm run build

      # Paso 1 (post-Paso 0): introducir typescript como devDependency,
      # añadir `npx tsc --noEmit` y un eslint config como required checks.
      # Por ahora se omiten para no instalar dependencias nuevas en este paso.
