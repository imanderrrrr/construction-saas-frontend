name: E2E

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    name: Web E2E (Playwright, hermetic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium

      # The specs mock all /api/** + Paddle, so no backend is needed. Playwright
      # starts the Vite dev server itself (see webServer in playwright.config.ts).
      - name: Run E2E tests
        run: npm run e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
